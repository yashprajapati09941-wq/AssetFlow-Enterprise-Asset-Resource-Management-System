<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - AssetFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">AssetFlow</span>

        <div>
            <a href="index.html" class="btn btn-light btn-sm">Dashboard</a>
            <a href="assets.html" class="btn btn-light btn-sm">Assets</a>
            <a href="employees.html" class="btn btn-light btn-sm">Employees</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Category Management</h2>

        <button class="btn btn-success">
            + Add Category
        </button>
    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-primary">

            <tr>
                <th>Category ID</th>
                <th>Category Name</th>
                <th>Description</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody>

            <tr>
                <td>CAT001</td>
                <td>Electronics</td>
                <td>Laptops, PCs, Monitors</td>
                <td>
                    <button class="btn btn-warning btn-sm">Edit</button>
                    <button class="btn btn-danger btn-sm">Delete</button>
                </td>
            </tr>

            <tr>
                <td>CAT002</td>
                <td>Furniture</td>
                <td>Tables, Chairs, Cabinets</td>
                <td>
                    <button class="btn btn-warning btn-sm">Edit</button>
                    <button class="btn btn-danger btn-sm">Delete</button>
                </td>
            </tr>

            <tr>
                <td>CAT003</td>
                <td>Vehicles</td>
                <td>Cars, Vans, Bikes</td>
                <td>
                    <button class="btn btn-warning btn-sm">Edit</button>
                    <button class="btn btn-danger btn-sm">Delete</button>
                </td>
            </tr>

        </tbody>

    </table>

</div>

<script src="js/script.js"></script>

</body>
</html>
