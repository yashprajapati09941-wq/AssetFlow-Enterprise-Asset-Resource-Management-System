<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Allocation - AssetFlow</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container-fluid">

<a class="navbar-brand" href="index.html">AssetFlow</a>

<div>
<a href="index.html" class="btn btn-light btn-sm">Dashboard</a>
<a href="assets.html" class="btn btn-light btn-sm">Assets</a>
<a href="employees.html" class="btn btn-light btn-sm">Employees</a>
<a href="categories.html" class="btn btn-light btn-sm">Categories</a>
<a href="reports.html" class="btn btn-light btn-sm">Reports</a>
</div>

</div>
</nav>

<div class="container mt-4">

<h2>Asset Allocation</h2>

<div class="card shadow p-4 mt-3">

<div class="mb-3">

<label class="form-label">Select Asset</label>

<select class="form-select">

<option>Dell Laptop</option>

<option>HP Printer</option>

<option>Office Chair</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Select Employee</label>

<select class="form-select">

<option>John Smith</option>

<option>Sarah Lee</option>

<option>David Brown</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Allocation Date</label>

<input type="date" class="form-control">

</div>

<button class="btn btn-primary" onclick="assignAsset()">
Assign Asset
</button>

</div>

<h3 class="mt-5">Allocated Assets</h3>

<table class="table table-bordered table-hover mt-3">

<thead class="table-primary">

<tr>

<th>Asset</th>

<th>Employee</th>

<th>Date</th>

<th>Status</th>

</tr>

</thead>

<tbody>

<tr>

<td>Dell Laptop</td>

<td>John Smith</td>

<td>2026-07-12</td>

<td><span class="badge bg-success">Allocated</span></td>

</tr>

<tr>

<td>HP Printer</td>

<td>Sarah Lee</td>

<td>2026-07-10</td>

<td><span class="badge bg-warning text-dark">Pending Return</span></td>

</tr>

</tbody>

</table>

</div>

<script>

function assignAsset(){

alert("Asset Assigned Successfully!");

}

</script>

<script src="js/script.js"></script>

</body>
</html>
